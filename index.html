<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Cond-mat arXiv Everyday">
    <title>Cond-mat arXiv Everyday</title>
    <link rel="icon" type="image/png" href="assets/logo2-removebg-preview.png">
    <link rel="shortcut icon" type="image/png" href="assets/logo2-removebg-preview.png">
    <link rel="stylesheet" href="css/styles.css?v=1.0.3">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>

    <script>
    window.MathJax = {
      tex: {
        inlineMath: [['$', '$'], ['\\(', '\\)']]
      }
    };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <!-- Authentication Scripts -->
    <script src="js/auth-config.js"></script>
    <script src="js/auth.js"></script>
    <!-- Data Source Configuration -->
    <script src="js/data-config.js"></script>
    <script>
        // Check authentication on page load
        Auth.requireAuth();

        // Show logout button only if password protection is enabled
        document.addEventListener('DOMContentLoaded', function() {
            const logoutButton = document.getElementById('logoutButton');
            if (logoutButton && Auth.isPasswordEnabled()) {
                logoutButton.style.display = '';
            }
        });
    </script>

    <script>
        window.onerror = function(message, source, lineno, colno, error) {
            const errorDiv = document.createElement('div');
            errorDiv.style.position = 'fixed';
            errorDiv.style.bottom = '10px';
            errorDiv.style.left = '10px';
            errorDiv.style.backgroundColor = 'rgba(255, 0, 0, 0.8)';
            errorDiv.style.color = 'white';
            errorDiv.style.padding = '10px';
            errorDiv.style.borderRadius = '5px';
            errorDiv.style.zIndex = '10000';
            errorDiv.style.maxWidth = '80%';
            errorDiv.textContent = `错误: ${message} (${source}:${lineno}:${colno})`;
            document.body.appendChild(errorDiv);
            
            setTimeout(() => errorDiv.remove(), 5000);
            
            return false;
        };
    </script>
</head>
<body>
    <div class="app-container">
        <header>

                </div>
                
                <div class="header-center">
                    <a href="index.html" class="site-logo">

                </div>
                
                <div class="header-controls">

                    </div>
                </div>
            </div>

            <div class="paper-container" id="paperContainer">

                    <div class="loading-spinner"></div>
                    <p>Loading papers...</p>
                </div>
            </div>
        </main>

    <footer>

    </footer>

    <!-- 回到顶部按钮 -->
    <button id="backToTop" class="back-to-top" title="back to top">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M7 14L12 9L17 14" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
    </button>

    <script>
      // 在桌面端默认展开分类下拉菜单
      document.addEventListener('DOMContentLoaded', function() {
        const categoryDetails = document.querySelector('details.category-label-container');
        if (categoryDetails && window.innerWidth >= 769) {
          categoryDetails.open = true;
          // 可选：阻止在桌面端关闭
          categoryDetails.addEventListener('toggle', function(e) {
            if (window.innerWidth >= 769) {
              this.open = true;
            }
          });
        }
      });
    </script>
    <script src="js/app.js?v=1.0.3"></script>
</body>
</html>
